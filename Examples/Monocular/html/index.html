<!DOCTYPE html>
<html>
<head>
    <title>ORB-SLAM3 Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f5f5f5; text-align: center; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .btn { padding: 12px 24px; margin: 10px; text-decoration: none; border: 1px solid #ccc; border-radius: 4px; display: inline-block; color: #333; font-weight: bold; transition: 0.3s; cursor: pointer; background: #fff; }
        .btn:hover { background: #e0e0e0; }
        .active { background: #007bff; color: #fff; border-color: #007bff; }
        .active:hover { background: #0056b3; }
        table { margin: auto; border-collapse: collapse; width: 100%; text-align: center; }
        th, td { padding: 10px; }
        tr { border-bottom: 1px solid #ddd; }
        .current-row { background: #e8f4f8; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ORB-SLAM3 Remote Control</h2>
        <h3>Current Mode: <span id="mode-text">Loading...</span></h3>
        <h3>Status: <span id="status-text">Loading...</span></h3>
        <hr>
        <div>
            <button id="btn-loc" class="btn" onclick="sendCommand('/loc')">Localization Mode</button>
            <button id="btn-map" class="btn" onclick="sendCommand('/map')">Mapping Mode</button>
            <button id="btn-pause" class="btn" onclick="togglePause()"></button>
        </div>
        <hr>
        <h3>Available Maps</h3>
        <div id="maps-container">
            Loading...
        </div>
        <div style="margin-top:20px;">
            <button class="btn" style="background:#ffc107;color:#333;" onclick="sendCommand('/newmap')">Create New Map</button>
        </div>
        <hr>
        <div>
            <button class="btn" style="background:#17a2b8;color:#fff;" onclick="window.location.href='/viewer.html'">Open 3D Viewer</button>
        </div>
        <p style="margin-top:20px;font-size:12px;color:#777;">Auto-refreshes every 1 second.</p>
    </div>

    <script>
        let isPaused = false;

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                // Update Mode
                const modeText = document.getElementById('mode-text');
                const btnLoc = document.getElementById('btn-loc');
                const btnMap = document.getElementById('btn-map');

                if (data.localizationMode) {
                    modeText.textContent = "Localization";
                    modeText.style.color = "#28a745";
                    btnLoc.classList.add("active");
                    btnMap.classList.remove("active");
                } else {
                    modeText.textContent = "Mapping";
                    modeText.style.color = "#007bff";
                    btnLoc.classList.remove("active");
                    btnMap.classList.add("active");
                }

                // Update Status
                const statusText = document.getElementById('status-text');
                const btnPause = document.getElementById('btn-pause');
                isPaused = data.paused;

                if (data.paused) {
                    statusText.textContent = "Paused";
                    statusText.style.color = "#dc3545";
                    btnPause.textContent = "Resume";
                    btnPause.style.background = "#28a745";
                    btnPause.style.color = "white";
                } else {
                    statusText.textContent = "Running";
                    statusText.style.color = "#28a745";
                    btnPause.textContent = "Pause";
                    btnPause.style.background = "#dc3545";
                    btnPause.style.color = "white";
                }

                // Update Maps Table
                let mapsHtml = '<table><tr><th>Map ID</th><th>KeyFrames</th><th>MapPoints</th><th>Action</th></tr>';
                data.maps.forEach((map, idx) => {
                    const isCurrent = (map.id === data.currentMapId);
                    mapsHtml += `<tr class="${isCurrent ? 'current-row' : ''}">
                        <td>${map.id}${isCurrent ? ' (Active)' : ''}</td>
                        <td>${map.keyframes}</td>
                        <td>${map.mappoints}</td>
                        <td>`;
                    
                    if (isCurrent) {
                        mapsHtml += `<span style="color:#28a745;padding:6px 12px;font-size:14px;margin:5px;">Current</span>`;
                    } else {
                        mapsHtml += `<button class="btn" style="padding:6px 12px;font-size:14px;margin:5px;" onclick="sendCommand('/switchmap?id=${idx}')">Switch</button>`;
                    }
                    mapsHtml += `</td></tr>`;
                });
                mapsHtml += '</table>';
                document.getElementById('maps-container').innerHTML = mapsHtml;

            } catch (err) {
                console.error('Error fetching status:', err);
            }
        }

        async function sendCommand(cmd) {
            try {
                await fetch(cmd);
                fetchStatus();
            } catch (err) {
                console.error('Error sending command:', err);
            }
        }

        function togglePause() {
            if (isPaused) {
                sendCommand('/resume');
            } else {
                sendCommand('/pause');
            }
        }

        // Fetch immediately and poll every second
        fetchStatus();
        setInterval(fetchStatus, 1000);
    </script>
</body>
</html>
